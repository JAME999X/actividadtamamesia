<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Analizador IA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Integración de IA en Atención al Cliente</h1>

<section>
<h2>1. Datos</h2>

<input id="tickets" placeholder="Tickets mensuales">
<input id="consultas" placeholder="Consultas por ticket">
<input id="tokensIn" placeholder="Tokens entrada">
<input id="tokensOut" placeholder="Tokens salida">
<input id="tiempoActual" placeholder="Tiempo actual (min)">
<input id="tiempoIA" placeholder="Tiempo con IA (min)">
<input id="costeHora" placeholder="Coste hora (€)">

<button onclick="calcular()">Calcular</button>
<p id="error"></p>
</section>

<section>
<h2>2. Resultados</h2>
<div id="resultados"></div>
</section>

<section>
<h2>3. Matriz comparativa</h2>
<table>
<tr><th>Criterio</th><th>API</th><th>Cloud</th></tr>
<tr><td>Coste inicial</td><td><input></td><td><input></td></tr>
<tr><td>Escalabilidad</td><td><input></td><td><input></td></tr>
<tr><td>Protección datos</td><td><input></td><td><input></td></tr>
<tr><td>Trazabilidad</td><td><input></td><td><input></td></tr>
<tr><td>Latencia</td><td><input></td><td><input></td></tr>
</table>
</section>

<section>
<h2>4. Mini-RAID</h2>
<textarea id="raid" placeholder="Riesgos / Supuestos / Incidencias / Dependencias"></textarea>
</section>

<section>
<h2>5. Decisión</h2>
<textarea id="decision"></textarea>
</section>

<section>
<h2>6. Resumen</h2>
<button onclick="generarResumen()">Generar resumen</button>
<textarea id="resumen"></textarea>
</section>

<script src="script.js"></script>
</body>
</html>
